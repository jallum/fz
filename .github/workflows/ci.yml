name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    env:
      RUST_TEST_THREADS: 1
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.5.0.1"
          elixir-version: "1.19.5"
          version-type: strict
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-audit
      - run: cargo audit
      - run: cargo test --workspace --doc
      - run: |
          cargo llvm-cov \
            --all-features \
            --workspace \
            --fail-under-lines "$(cat .coverage-threshold)" \
            --json --summary-only \
            --output-path coverage.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-json
          path: coverage.json

  badge:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-json
      - name: Push coverage badge to badges branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PCT=$(jq -r '.data[0].totals.lines.percent | floor' coverage.json)
          if   [ "$PCT" -ge 80 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 60 ]; then COLOR=yellow
          else COLOR=red
          fi
          curl -sf "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}.svg" > coverage.svg
          git init
          git checkout -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git commit -m "coverage: ${PCT}%"
          git push --force \
            "https://x-access-token:${GH_TOKEN}@github.com/jallum/fz.git" \
            badges
